<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Still Moment — Running Timer · Sanduhr</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>

  <style>
    body {
      background: #0a0604;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 24px 64px;
      font-family: var(--sm-font-ui);
      color: var(--sm-text);
    }
    .title {
      font-family: var(--sm-font-display);
      font-size: 22px; font-weight: 400; color: var(--sm-text-2);
      letter-spacing: 0.01em;
      text-align: center;
    }
    .title em { color: var(--sm-accent-text); font-style: italic; }
    .row {
      display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
    }
    .frame {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .frame-label {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--sm-text-3);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="title">Running Timer · <em>Sanduhr-Vessel</em></div>
  <div id="root"></div>

  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="timer-running-sanduhr.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { RunningSanduhr, RunningSanduhrStatic } = window.SM_Sanduhr;

    function App() {
      return (
        <div className="row">
          <div className="frame">
            <RunningSanduhrStatic duration={600} elapsed={0}/>
            <div className="frame-label">0 % · Start</div>
          </div>
          <div className="frame">
            <RunningSanduhr duration={600} elapsed={184}/>
            <div className="frame-label">live · läuft (Pegel sinkt)</div>
          </div>
          <div className="frame">
            <RunningSanduhrStatic duration={600} elapsed={540}/>
            <div className="frame-label">90 % · kurz vor Ende</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
